<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CalTrack — Daily Calorie Tracker</title>
  <meta name="description" content="Snap a photo of your food and track your daily calories.">

  <meta name="theme-color" content="#16a34a" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111813" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">

  <!-- iOS Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="CalTrack">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>CalTrack</h1>
    <p class="tagline">Snap your food. Know your calories.</p>
  </header>

  <main class="app-main">
    <section class="capture-section">
      <!-- Opens the rear camera directly on phones -->
      <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
      <!-- No capture attribute: lets the user pick from the gallery -->
      <input type="file" id="gallery-input" accept="image/*" hidden>

      <button type="button" id="take-photo-btn" class="btn btn-primary">
        <span class="btn-icon" aria-hidden="true">📷</span>
        Take photo
      </button>
      <button type="button" id="gallery-btn" class="btn btn-secondary">
        Choose from gallery
      </button>
      <div id="queue-banner" class="queue-banner" hidden>
        <span id="queue-text"></span>
        <button type="button" id="queue-analyze-btn" class="btn-small">วิเคราะห์ตอนนี้</button>
      </div>
    </section>

    <section class="preview-section" id="preview-section" hidden>
      <h2 class="section-title">Your photo</h2>
      <figure class="preview-frame">
        <img id="preview-image" alt="Preview of your food photo">
      </figure>
      <button type="button" id="analyze-btn" class="btn btn-primary">
        <span class="btn-icon" aria-hidden="true">✨</span>
        Analyze
      </button>
    </section>

    <section class="results-section" id="results-section">
      <h2 class="section-title">Results</h2>
      <div id="results" class="results-card">
        <p class="results-empty">No results yet — take a photo of your food to get started.</p>
      </div>
      <div id="save-actions" class="save-actions" hidden>
        <button type="button" id="save-btn" class="btn btn-primary">บันทึกมื้อนี้</button>
        <button type="button" id="dismiss-btn" class="btn btn-secondary">แค่เช็คเฉยๆ ไม่บันทึก</button>
      </div>
    </section>

    <section class="today-section" id="today-section">
      <h2 class="section-title">วันนี้กินไปแล้ว</h2>
      <div class="results-card today-card">
        <p class="today-total"><span id="today-total">0</span> kcal</p>
        <div class="goal-block">
          <div class="goal-bar" role="presentation"><div id="goal-fill" class="goal-fill"></div></div>
          <div class="goal-row">
            <span id="goal-status" class="goal-status"></span>
            <span class="goal-actions">
              <button type="button" id="share-btn" class="btn-small">แชร์</button>
              <button type="button" id="goal-edit-btn" class="btn-small">แก้เป้า</button>
            </span>
          </div>
          <div id="goal-edit" class="meal-edit" hidden>
            <input type="number" id="goal-input" class="meal-edit-input" min="1" inputmode="numeric">
            <button type="button" id="goal-save-btn" class="btn-small">บันทึก</button>
            <button type="button" id="goal-cancel-btn" class="btn-small">ยกเลิก</button>
          </div>
        </div>
        <ul id="today-list" class="today-list"></ul>
        <p id="today-empty" class="results-empty">ยังไม่มีมื้อที่บันทึกวันนี้</p>
      </div>
    </section>

    <section class="week-section" id="week-section">
      <h2 class="section-title">7 วันที่ผ่านมา</h2>
      <div class="results-card week-card">
        <div class="week-chart">
          <div id="chart-plot" class="chart-plot"></div>
          <div id="chart-days" class="chart-days"></div>
        </div>
        <p id="chart-readout" class="chart-readout">แตะที่แท่งเพื่อดูยอดแต่ละวัน</p>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <p>CalTrack · ถ่ายรูป รู้แคลอรี่ 🥗</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
